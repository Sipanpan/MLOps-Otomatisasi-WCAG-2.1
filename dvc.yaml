stages:
  prepare:
    cmd: python src/prepare.py
    deps:
      - src/prepare.py
    outs:
      - data/raw

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw
    outs:
      - data/processed

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed
    # Outs disesuaikan jika train.py menyimpan model (misal ke folder models/)
    # Jika train.py menyimpan file model .pkl atau grafik, definisikan di sini:
    outs:
      - models/
